name: Release Validation

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-and-build:
    name: Validate Release Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      # Safely extract the version from the tag context file
      - name: Extract Metadata Version
        id: get_version
        run: |
          # Check if the tag commit contains a src folder layout before building
          if [ ! -d "src" ]; then
            echo "::warning::Skipping legacy tag build validation. This tag was created before the src/ package restructuring."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
            exit 0
          fi

          PROJECT_VERSION=$(python -c "import tomllib; f = open('pyproject.toml', 'rb'); print(tomllib.load(f)['project']['version'])")
          echo "PROJECT_VERSION=$PROJECT_VERSION" >> $GITHUB_ENV
          
          GIT_TAG=${GITHUB_REF#refs/tags/v}
          echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV
          echo "SKIP_BUILD=false" >> $GITHUB_ENV

      - name: Verify Tag Matches pyproject.toml
        if: env.SKIP_BUILD == 'false'
        run: |
          echo "Checking version consistency..."
          echo "Git Tag Version: ${{ env.GIT_TAG }}"
          echo "Pyproject Version: ${{ env.PROJECT_VERSION }}"
          if [ "${{ env.GIT_TAG }}" != "${{ env.PROJECT_VERSION }}" ]; then
            echo "::error::Mismatched Versioning! Git tag 'v${{ env.GIT_TAG }}' does not match pyproject.toml version '${{ env.PROJECT_VERSION }}'"
            exit 1
          fi
          echo "[PASS] Versions match perfectly."

      - name: Build Source and Binary Distributions
        if: env.SKIP_BUILD == 'false'
        run: python -m build

      - name: Run Twine Validation Check
        if: env.SKIP_BUILD == 'false'
        run: python -m twine check dist/*