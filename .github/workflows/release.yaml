name: Production Release

on:
  push:
    tags:
      - '*'

jobs:
  validate-build-publish:
    name: Build, Release, and Publish
    runs-on: ubuntu-latest
    # only run if tag is pushed on main branch
    if: github.ref_type == 'tag'
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Check if the tag belongs to the main branch history
      - name: Verify Tag is on Main Branch
        run: |
          git fetch origin main
          if ! git branch -r --contains ${{ github.sha }} | grep -q "origin/main"; then
            echo "::error::Tag was not pushed on the main branch! Aborting release pipeline."
            exit 1
          fi
          echo "[PASS] Tag is verified on the main branch."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Tar and Wheel building tools
      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine tomli-w

      - name: Extract Metadata Version
        id: get_version
        run: |
          if [ ! -d "src" ]; then
            echo "::error::Missing src/ directory structure. Aborting production release."
            exit 1
          fi

          PROJECT_VERSION=$(python -c "import tomllib; f = open('pyproject.toml', 'rb'); print(tomllib.load(f)['project']['version'])")
          echo "PROJECT_VERSION=$PROJECT_VERSION" >> $GITHUB_ENV
          
          GIT_TAG="${GITHUB_REF_NAME}"
          echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV

      - name: Verify Tag Matches pyproject.toml
        run: |
          echo "Checking version consistency..."
          echo "Git Tag Version: ${{ env.GIT_TAG }}"
          echo "Pyproject Version: ${{ env.PROJECT_VERSION }}"
          if [ "${{ env.GIT_TAG }}" != "${{ env.PROJECT_VERSION }}" ]; then
            echo "::error::Mismatched Versioning! Git tag '${{ env.GIT_TAG }}' does not match pyproject.toml version '${{ env.PROJECT_VERSION }}'"
            exit 1
          fi
          echo "[PASS] Versions match perfectly."

      # --- BUILD STANDARD PACKAGE ---
      - name: Build Standard Distributions
        run: python -m build

      # --- MODIFY TOML & BUILD CORE PACKAGE ---
      - name: Rewrite pyproject.toml for Core Variant
        run: |
          python -c '
          import tomllib
          import tomli_w

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          # Update the package name
          data["project"]["name"] = "at-gan-core"

          # Remove the heavy TensorFlow requirement from main dependencies
          old_deps = data["project"]["dependencies"]
          new_deps = [d for d in old_deps if not d.startswith("tensorflow")]
          data["project"]["dependencies"] = new_deps

          with open("pyproject.toml", "wb") as f:
              tomli_w.dump(data, f)
          '
          echo "[INFO] pyproject.toml modified successfully for core build."

      - name: Build Core Distributions
        run: python -m build

      # --- VALIDATION AND RELEASE ---
      - name: Run Twine Validation Check
        run: python -m twine check dist/*

      # Automatically create the GitHub Release page and write the changelog
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Trusted Publishers
      - name: Publish All Packages to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1