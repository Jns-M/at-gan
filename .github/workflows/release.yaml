name: Production Release

on:
  release:
    types: [published]

jobs:
  validate-build-publish:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # In a release event, GITHUB_REF is the tag (e.g., refs/tags/v1.2.3)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Tar and Wheel building tools
      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Extract Metadata Version
        id: get_version
        run: |
          if [ ! -d "src" ]; then
            echo "::error::Missing src/ directory structure. Aborting production release."
            exit 1
          fi

          PROJECT_VERSION=$(python -c "import tomllib; f = open('pyproject.toml', 'rb'); print(tomllib.load(f)['project']['version'])")
          echo "PROJECT_VERSION=$PROJECT_VERSION" >> $GITHUB_ENV
          
          # Strip the 'v' prefix from the release tag
          GIT_TAG=${{ github.event.release.tag_name }}
          GIT_TAG=${GIT_TAG#v}
          echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV

      - name: Verify Tag Matches pyproject.toml
        run: |
          echo "Checking version consistency..."
          echo "Git Tag Version: ${{ env.GIT_TAG }}"
          echo "Pyproject Version: ${{ env.PROJECT_VERSION }}"
          if [ "${{ env.GIT_TAG }}" != "${{ env.PROJECT_VERSION }}" ]; then
            echo "::error::Mismatched Versioning! Git tag 'v${{ env.GIT_TAG }}' does not match pyproject.toml version '${{ env.PROJECT_VERSION }}'"
            exit 1
          fi
          echo "[PASS] Versions match perfectly."

      - name: Build Source and Binary Distributions
        run: python -m build

      - name: Run Twine Validation Check
        run: python -m twine check dist/*

      # Publish directly to PyPI using PyPA's official trusted publishing action
      - name: Publish Package to PyPI
        uses: pypa/github-action-pypi-publish@release/v1